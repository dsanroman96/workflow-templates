name: "Release generic project"
description: "Updates a plain-text version file for generic projects and reports which files changed."
inputs:
  target_path:
    description: "Path to the generic version file to overwrite (for example: VERSION)."
    required: true
  next_version:
    description: "Next release version to write, in X.Y.Z format."
    required: true
outputs:
  changed_files:
    description: "Space-separated file list to commit after applying generic release changes."
    value: ${{ steps.result.outputs.changed_files }}
runs:
  using: "composite"
  steps:
    - name: Write next version
      shell: bash
      env:
        TARGET_PATH: ${{ inputs.target_path }}
        NEXT_VERSION: ${{ inputs.next_version }}
      run: |
        set -euo pipefail
        echo "${NEXT_VERSION}" > "${TARGET_PATH}"

    - id: result
      shell: bash
      env:
        TARGET_PATH: ${{ inputs.target_path }}
      run: |
        set -euo pipefail
        echo "changed_files=${TARGET_PATH}" >> "${GITHUB_OUTPUT}"
