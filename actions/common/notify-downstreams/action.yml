name: "Notify downstream repositories"
description: "Sends repository_dispatch events for an upstream release to each configured downstream repository."
inputs:
  target_repos:
    description: "Comma-separated list of downstream repositories in owner/repo format."
    required: false
    default: ""
  dispatch_token:
    description: "GitHub token (PAT) used to call the repository dispatch API on downstream repos."
    required: false
    default: ""
  upstream_name:
    description: "Name of the released upstream repository included in the dispatch payload."
    required: true
  version_tag:
    description: "Released upstream tag in vX.Y.Z format included in the dispatch payload."
    required: true
  open_pr:
    description: "Flag forwarded to downstream automation indicating whether it should open pull requests."
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Dispatch update events
      shell: bash
      env:
        TARGET_REPOS: ${{ inputs.target_repos }}
        DISPATCH_TOKEN: ${{ inputs.dispatch_token }}
        UPSTREAM_NAME: ${{ inputs.upstream_name }}
        VERSION_TAG: ${{ inputs.version_tag }}
        OPEN_PR: ${{ inputs.open_pr }}
      run: |
        set -euo pipefail

        if [ -z "${TARGET_REPOS}" ] && [ -z "${DISPATCH_TOKEN}" ]; then
          echo "No downstream repos or dispatch token configured; skipping notifications."
          exit 0
        fi

        if [ -z "${TARGET_REPOS}" ] || [ -z "${DISPATCH_TOKEN}" ]; then
          echo "Both downstream repos and DOWNSTREAM_REPO_PAT are required when notifications are enabled."
          exit 1
        fi

        had_failures=false
        failed_repos=""
        REPO_LIST="${TARGET_REPOS}"
        REPO_LIST="$(printf '%s' "${REPO_LIST}" | tr ',' '\n')"
        while IFS= read -r TARGET_REPO; do
          TARGET_REPO="$(echo "${TARGET_REPO}" | xargs)"
          [ -z "${TARGET_REPO}" ] && continue

          if [[ ! "${TARGET_REPO}" =~ ^[^/]+/[^/]+$ ]]; then
            echo "::warning::Invalid repository format: ${TARGET_REPO}. Skipping."
            had_failures=true
            failed_repos="${failed_repos}${failed_repos:+,}${TARGET_REPO}"
            continue
          fi

          if [ "${OPEN_PR}" = "true" ]; then
            OPEN_PR_JSON=true
          else
            OPEN_PR_JSON=false
          fi

          PAYLOAD="$(jq -cn \
            --arg upstream "${UPSTREAM_NAME}" \
            --arg ver "${VERSION_TAG}" \
            --argjson open_pr "${OPEN_PR_JSON}" \
            '{event_type:"upstream-released",client_payload:{upstream:($upstream|gsub("^\\s+|\\s+$";"")),version:($ver|gsub("^\\s+|\\s+$";"")),open_pr:$open_pr}}')"

          echo "Dispatch payload for ${TARGET_REPO}: ${PAYLOAD}"

          HTTP_CODE="$(curl -sS -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            --data "${PAYLOAD}")"

          echo "Dispatch to ${TARGET_REPO} returned HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "204" ]; then
            response="$(cat /tmp/dispatch_response.json)"
            echo "::warning::Dispatch failed for ${TARGET_REPO} (HTTP ${HTTP_CODE}). Response: ${response}"
            had_failures=true
            failed_repos="${failed_repos}${failed_repos:+,}${TARGET_REPO}"
            continue
          fi
        done <<< "${REPO_LIST}"

        if [ "${had_failures}" = "true" ]; then
          echo "::warning::Downstream dispatch failed for: ${failed_repos}. Upstream release continues."
        fi
