name: "Commit And Push If Changed"
description: "Stages selected files, creates a commit only when the index changed, and pushes the current HEAD branch."
inputs:
  files:
    description: "Space-separated list of file paths to stage with git add."
    required: true
  commit_message:
    description: "Commit message used when staged changes exist."
    required: true
  fail_when_no_changes:
    description: "When true, fail if staging produces no diff; when false, exit successfully without committing."
    required: false
    default: "true"
outputs:
  committed:
    description: "Whether this action created and pushed a commit (true/false)."
    value: ${{ steps.commit.outputs.committed }}
runs:
  using: "composite"
  steps:
    - id: commit
      shell: bash
      env:
        FILES: ${{ inputs.files }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        FAIL_WHEN_NO_CHANGES: ${{ inputs.fail_when_no_changes }}
      run: |
        set -euo pipefail

        git add ${FILES}

        if git diff --cached --quiet; then
          if [ "${FAIL_WHEN_NO_CHANGES}" = "true" ]; then
            echo "No changes detected in staged files: ${FILES}"
            exit 1
          fi
          echo "committed=false" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        git commit -m "${COMMIT_MESSAGE}"
        git push origin HEAD
        echo "committed=true" >> "${GITHUB_OUTPUT}"
