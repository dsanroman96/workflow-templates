name: "Apply release logic by handler"
description: "Runs release logic for an explicit release_handler route and returns changed files."
inputs:
  release_handler:
    description: "Explicit release handler route in type/variant format (example: typescript/bun)."
    required: true
  tag:
    description: "Release tag in vX.Y.Z format."
    required: true
outputs:
  changed_files:
    description: "Space-separated file list changed by the selected release implementation."
    value: ${{ inputs.release_handler == 'generic/default' && steps.generic_release.outputs.changed_files || inputs.release_handler == 'typescript/bun' && steps.typescript_bun_release.outputs.changed_files || steps.typescript_npm_release.outputs.changed_files }}
runs:
  using: "composite"
  steps:
    - name: Apply generic release logic
      if: ${{ inputs.release_handler == 'generic/default' }}
      id: generic_release
      uses: dsanroman96/workflow-templates/actions/release-generic@main
      with:
        target_path: VERSION
        tag: ${{ inputs.tag }}

    - name: Apply TypeScript Bun release logic
      if: ${{ inputs.release_handler == 'typescript/bun' }}
      id: typescript_bun_release
      uses: dsanroman96/workflow-templates/actions/release-typescript/bun@main
      with:
        target_path: package.json
        tag: ${{ inputs.tag }}

    - name: Apply TypeScript npm release logic
      if: ${{ inputs.release_handler == 'typescript/npm' }}
      id: typescript_npm_release
      uses: dsanroman96/workflow-templates/actions/release-typescript/npm@main
      with:
        target_path: package.json
        tag: ${{ inputs.tag }}
