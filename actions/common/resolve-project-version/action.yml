name: "Resolve project version"
description: "Resolves target version file and reads current version by project type"
inputs:
  project_type:
    description: "Project type: generic or typescript"
    required: true
  version_file_path:
    description: "Optional custom version file path"
    required: false
    default: ""
outputs:
  target_path:
    description: "Resolved target file path"
    value: ${{ steps.resolve.outputs.target_path }}
  current_version:
    description: "Current version string"
    value: ${{ steps.resolve.outputs.current_version }}
runs:
  using: "composite"
  steps:
    - id: resolve
      shell: bash
      env:
        PROJECT_TYPE: ${{ inputs.project_type }}
        VERSION_FILE_PATH: ${{ inputs.version_file_path }}
      run: |
        set -euo pipefail

        resolve_path() {
          local provided="$1"
          local default_path="$2"
          if [ -n "${provided}" ]; then
            echo "${provided}"
          else
            echo "${default_path}"
          fi
        }

        case "${PROJECT_TYPE}" in
          generic)
            TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "VERSION")"
            CURRENT_VERSION="$(cat "${TARGET_PATH}")"
            ;;
          typescript)
            TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "package.json")"
            CURRENT_VERSION="$(node -p "require('./${TARGET_PATH}').version")"
            ;;
          *)
            echo "Unsupported project_type: ${PROJECT_TYPE}"
            echo "Supported values: generic, typescript"
            exit 1
            ;;
        esac

        echo "target_path=${TARGET_PATH}" >> "${GITHUB_OUTPUT}"
        echo "current_version=${CURRENT_VERSION}" >> "${GITHUB_OUTPUT}"
