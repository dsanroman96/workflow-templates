name: "Finalize release"
description: "Commits version bump, pushes tag, and creates GitHub release"
inputs:
  changed_files:
    description: "Files to add and commit"
    required: true
  next_version:
    description: "Next version in X.Y.Z format"
    required: true
  tag:
    description: "Tag in vX.Y.Z format"
    required: true
runs:
  using: "composite"
  steps:
    - name: Commit and push release changes
      uses: dsanroman96/workflow-templates/actions/common/commit-and-push-if-changed@main
      with:
        files: ${{ inputs.changed_files }}
        commit_message: "chore: release v${{ inputs.next_version }}"
        fail_when_no_changes: "true"

    - name: Create and push tag
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        git tag "${TAG}"
        git push origin HEAD
        git push origin "${TAG}"

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        body: "Automated release."
