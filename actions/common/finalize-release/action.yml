name: "Finalize release"
description: "Commits release file changes, pushes the release tag, and publishes a GitHub Release entry."
inputs:
  changed_files:
    description: "Space-separated list of files produced by release logic that must be committed."
    required: true
  tag:
    description: "Release tag in vX.Y.Z format to create and publish."
    required: true
runs:
  using: "composite"
  steps:
    - name: Commit and push release changes
      shell: bash
      env:
        FILES: ${{ inputs.changed_files }}
        COMMIT_MESSAGE: "chore: release ${{ inputs.tag }}"
      run: |
        set -euo pipefail

        git add ${FILES}

        if git diff --cached --quiet; then
          echo "No changes detected in staged files: ${FILES}"
          exit 1
        fi

        git commit -m "${COMMIT_MESSAGE}"
        git push origin HEAD

    - name: Create and push tag
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        git tag "${TAG}"
        git push origin HEAD
        git push origin "${TAG}"

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        body: "Automated release."
        generate_release_notes: true
