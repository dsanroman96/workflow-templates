name: "Finalize release"
description: "Commits release file changes, pushes the release tag, and publishes a GitHub Release entry."
inputs:
  changed_files:
    description: "Space-separated list of files produced by release logic that must be committed."
    required: true
  next_version:
    description: "Release version in X.Y.Z format, used in the release commit message."
    required: true
  tag:
    description: "Release tag in vX.Y.Z format to create and publish."
    required: true
runs:
  using: "composite"
  steps:
    - name: Commit and push release changes
      uses: dsanroman96/workflow-templates/actions/common/commit-and-push-if-changed@main
      with:
        files: ${{ inputs.changed_files }}
        commit_message: "chore: release v${{ inputs.next_version }}"
        fail_when_no_changes: "true"

    - name: Create and push tag
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        git tag "${TAG}"
        git push origin HEAD
        git push origin "${TAG}"

    - name: Publish GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        body: "Automated release."
        generate_release_notes: true
