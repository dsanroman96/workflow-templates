name: "Configure Git Bot"
description: "Sets git user.name and user.email to the standard GitHub Actions bot identity for automated commits."
runs:
  using: "composite"
  steps:
    - name: Configure git user
      shell: bash
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
