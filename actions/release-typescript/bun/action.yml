name: "Release TypeScript project (Bun)"
description: "Updates package.json (self/dependency), refreshes Bun lockfile, and reports changed files."
inputs:
  target_path:
    description: "Path to package.json."
    required: true
  tag:
    description: "Release tag in vX.Y.Z format."
    required: true
  dependency_name:
    description: "Dependency name to update, or self to update project version."
    required: true
outputs:
  changed:
    description: "Whether package.json or lockfile changed."
    value: ${{ steps.result.outputs.changed }}
  changed_files:
    description: "Space-separated file list to commit after Bun release changes."
    value: ${{ steps.result.outputs.changed_files }}
runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Update package.json
      id: update
      shell: bash
      env:
        TARGET_PATH: ${{ inputs.target_path }}
        TAG: ${{ inputs.tag }}
        DEPENDENCY_NAME: ${{ inputs.dependency_name }}
      run: |
        set -euo pipefail

        CHANGED="$(TARGET_PATH="${TARGET_PATH}" TAG="${TAG}" DEPENDENCY_NAME="${DEPENDENCY_NAME}" GITHUB_REPOSITORY_OWNER="${GITHUB_REPOSITORY_OWNER}" node -e "const fs=require('fs'); const p=process.env.TARGET_PATH; const tag=process.env.TAG; const dep=process.env.DEPENDENCY_NAME; const owner=process.env.GITHUB_REPOSITORY_OWNER; if(!dep){console.error('dependency_name is required'); process.exit(1);} const pkg=JSON.parse(fs.readFileSync(p,'utf8')); let changed=false; if(dep==='self'){const next=tag.replace(/^v/,''); if(pkg.version!==next){pkg.version=next; changed=true;}} else {pkg.dependencies=pkg.dependencies||{}; const spec=`github:${owner}/${dep}#${tag}`; if(pkg.dependencies[dep]!==spec){pkg.dependencies[dep]=spec; changed=true;}} if(changed){fs.writeFileSync(p, JSON.stringify(pkg, null, 2)+'\\n');} process.stdout.write(changed?'true':'false');")"

        echo "changed=${CHANGED}" >> "${GITHUB_OUTPUT}"

    - name: Refresh Bun lockfile
      shell: bash
      env:
        TARGET_PATH: ${{ inputs.target_path }}
      run: |
        set -euo pipefail
        workdir="$(dirname "${TARGET_PATH}")"
        if [ "${workdir}" = "." ]; then
          bun install --lockfile-only
        else
          (cd "${workdir}" && bun install --lockfile-only)
        fi

    - id: result
      shell: bash
      env:
        TARGET_PATH: ${{ inputs.target_path }}
      run: |
        set -euo pipefail
        workdir="$(dirname "${TARGET_PATH}")"
        files="${TARGET_PATH}"
        if [ -f "${workdir}/bun.lock" ]; then
          files="${files} ${workdir}/bun.lock"
        elif [ -f "${workdir}/bun.lockb" ]; then
          files="${files} ${workdir}/bun.lockb"
        fi
        if git diff --quiet -- ${files}; then
          echo "changed=false" >> "${GITHUB_OUTPUT}"
        else
          echo "changed=true" >> "${GITHUB_OUTPUT}"
        fi
        echo "changed_files=${files}" >> "${GITHUB_OUTPUT}"
