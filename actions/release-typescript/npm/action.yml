name: "Release TypeScript project (npm)"
description: "Updates package.json version, refreshes npm lockfile, and reports changed files."
inputs:
  target_path:
    description: "Path to package.json."
    required: true
  tag:
    description: "Release tag in vX.Y.Z format."
    required: true
outputs:
  changed_files:
    description: "Space-separated file list to commit after npm release changes."
    value: ${{ steps.result.outputs.changed_files }}
runs:
  using: "composite"
  steps:
    - name: Write next version and npm lockfile
      shell: bash
      env:
        TARGET_PATH: ${{ inputs.target_path }}
        TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        version="${TAG#v}"
        TARGET_PATH="${TARGET_PATH}" NEXT_VERSION="${version}" node -e "const fs=require('fs'); const p=process.env.TARGET_PATH; const data=JSON.parse(fs.readFileSync(p,'utf8')); data.version=process.env.NEXT_VERSION; fs.writeFileSync(p, JSON.stringify(data, null, 2) + '\n');"
        workdir="$(dirname "${TARGET_PATH}")"
        if [ "${workdir}" = "." ]; then
          npm install --package-lock-only --ignore-scripts
        else
          (cd "${workdir}" && npm install --package-lock-only --ignore-scripts)
        fi

    - id: result
      shell: bash
      env:
        TARGET_PATH: ${{ inputs.target_path }}
      run: |
        set -euo pipefail
        workdir="$(dirname "${TARGET_PATH}")"
        files="${TARGET_PATH}"
        if [ -f "${workdir}/package-lock.json" ]; then
          files="${files} ${workdir}/package-lock.json"
        fi
        echo "changed_files=${files}" >> "${GITHUB_OUTPUT}"
