name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      project_type:
        description: "How to read/write project version"
        required: true
        default: generic
        type: choice
        options:
          - generic
          - typescript
          - python
      version_file_path:
        description: "Optional custom version file path"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        env:
          PROJECT_TYPE: ${{ github.event.inputs.project_type }}
          VERSION_FILE_PATH: ${{ github.event.inputs.version_file_path }}
        run: |
          set -euo pipefail

          bump_version() {
            local current="$1"
            local bump="$2"
            local major minor patch

            IFS='.' read -r major minor patch <<< "${current}"
            case "${bump}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported bump type: ${bump}"
                exit 1
                ;;
            esac

            echo "${major}.${minor}.${patch}"
          }

          resolve_path() {
            local provided="$1"
            local default_path="$2"
            if [ -n "${provided}" ]; then
              echo "${provided}"
            else
              echo "${default_path}"
            fi
          }

          CURRENT_VERSION=""
          CHANGED_FILES=""
          TARGET_PATH=""

          case "${PROJECT_TYPE}" in
            generic)
              TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "VERSION")"
              CURRENT_VERSION="$(cat "${TARGET_PATH}")"
              CHANGED_FILES="${TARGET_PATH}"
              ;;
            typescript)
              TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "package.json")"
              CURRENT_VERSION="$(node -p "require('./${TARGET_PATH}').version")"
              CHANGED_FILES="${TARGET_PATH}"
              ;;
            python)
              TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "pyproject.toml")"
              CURRENT_VERSION="$(TARGET_PATH="${TARGET_PATH}" python3 - <<'PY'
import pathlib
import re
import sys
import os

target_path = os.environ["TARGET_PATH"]
content = pathlib.Path(target_path).read_text(encoding="utf-8")
section = None
version = None

for line in content.splitlines():
    stripped = line.strip()
    if stripped.startswith("[") and stripped.endswith("]"):
        section = stripped.strip("[]")
    m = re.match(r'version\s*=\s*["\']([^"\']+)["\']', stripped)
    if m and section in ("project", "tool.poetry"):
        version = m.group(1)
        break

if not version:
    print(f"Could not find version in [project] or [tool.poetry] section of {target_path}", file=sys.stderr)
    sys.exit(1)

print(version)
PY
)"
              CHANGED_FILES="${TARGET_PATH}"
              ;;
            *)
              echo "Unsupported project_type: ${PROJECT_TYPE}"
              exit 1
              ;;
          esac

          CURRENT_VERSION="${CURRENT_VERSION#v}"
          if [[ ! "${CURRENT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version must be semantic version X.Y.Z. Got: ${CURRENT_VERSION}"
            exit 1
          fi

          NEXT_VERSION="$(bump_version "${CURRENT_VERSION}" "${{ github.event.inputs.bump }}")"

          case "${PROJECT_TYPE}" in
            generic)
              echo "${NEXT_VERSION}" > "${TARGET_PATH}"
              ;;
            typescript)
              TARGET_PATH="${TARGET_PATH}" NEXT_VERSION="${NEXT_VERSION}" node -e "const fs=require('fs'); const p=process.env.TARGET_PATH; const data=JSON.parse(fs.readFileSync(p,'utf8')); data.version=process.env.NEXT_VERSION; fs.writeFileSync(p, JSON.stringify(data, null, 2) + '\n');"
              ;;
            python)
              TARGET_PATH="${TARGET_PATH}" NEXT_VERSION="${NEXT_VERSION}" python3 - <<'PY'
import os
import pathlib
import re
import sys

path = pathlib.Path(os.environ["TARGET_PATH"])
content = path.read_text(encoding="utf-8")
target = os.environ["NEXT_VERSION"]

section = None
found_section = False
replaced = False
lines = []

for line in content.splitlines(keepends=True):
    stripped = line.strip()
    if stripped.startswith("[") and stripped.endswith("]"):
        section = stripped.strip("[]")
    if section in ("project", "tool.poetry"):
        found_section = True
        m = re.match(r'^(\s*version\s*=\s*["\'])([^"\']+)(["\']\s*)$', line.rstrip("\n"))
        if m and not replaced:
            lines.append(f"{m.group(1)}{target}{m.group(3)}\n")
            replaced = True
            continue
    lines.append(line)

if not found_section or not replaced:
    print("Could not update version in [project] or [tool.poetry] section of pyproject.toml", file=sys.stderr)
    sys.exit(1)

path.write_text("".join(lines), encoding="utf-8")
PY
              ;;
          esac

          echo "next_version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "changed_files=${CHANGED_FILES}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        run: |
          set -euo pipefail
          git add ${{ steps.version.outputs.changed_files }}
          git commit -m "chore: release v${{ steps.version.outputs.next_version }}"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: "Automated release."

      - name: Notify consumer repositories
        env:
          TARGET_REPOS: ${{ secrets.CONSUMER_REPOS }}
          DISPATCH_TOKEN: ${{ secrets.CONSUMER_REPO_PAT }}
          DEPENDENCY_NAME: ${{ github.event.repository.name }}
          VERSION_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "Missing required secret: CONSUMER_REPO_PAT"
            exit 1
          fi

          REPO_LIST="${TARGET_REPOS}"
          if [ -z "${REPO_LIST}" ]; then
            echo "Missing required secret: CONSUMER_REPOS"
            exit 1
          fi

          REPO_LIST="$(printf '%s' "${REPO_LIST}" | tr ',' '\n')"
          while IFS= read -r TARGET_REPO; do
            TARGET_REPO="$(echo "${TARGET_REPO}" | xargs)"
            [ -z "${TARGET_REPO}" ] && continue

            if [[ ! "${TARGET_REPO}" =~ ^[^/]+/[^/]+$ ]]; then
              echo "Invalid repository format: ${TARGET_REPO}"
              exit 1
            fi

            curl --fail-with-body -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
              "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
              -d "{\"event_type\":\"dependency-released\",\"client_payload\":{\"dependency\":\"${DEPENDENCY_NAME}\",\"version\":\"${VERSION_TAG}\"}}"
          done <<< "${REPO_LIST}"
