name: Downstream Update Template

on:
  workflow_call:
    inputs:
      upstream_name:
        description: "Upstream repository name received from dispatch payload."
        required: true
        type: string
      version_tag:
        description: "Released upstream tag in vX.Y.Z format."
        required: true
        type: string
      open_pr:
        description: "When true, open a PR instead of pushing directly to the default branch."
        required: false
        type: boolean
        default: true
      dependency_file_path:
        description: "Dependency file path to update."
        required: true
        type: string
      release_handler:
        description: "Release handler route to apply (example: typescript/bun)."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git bot
        uses: dsanroman96/workflow-templates/actions/common/configure-git-bot@main

      - name: Apply downstream update logic
        id: update
        uses: dsanroman96/workflow-templates/actions/common/apply-release-logic@main
        with:
          release_handler: ${{ inputs.release_handler }}
          dependency_name: ${{ inputs.upstream_name }}
          target_path: ${{ inputs.dependency_file_path }}
          tag: ${{ inputs.version_tag }}

      - name: Commit and push
        if: steps.update.outputs.changed == 'true' && !inputs.open_pr
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.update.outputs.changed_files }}
          UPSTREAM_NAME: ${{ inputs.upstream_name }}
          VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          set -euo pipefail
          git add ${CHANGED_FILES}
          git commit -m "chore: update ${UPSTREAM_NAME} to ${VERSION_TAG}"
          git push

      - name: Open pull request
        if: steps.update.outputs.changed == 'true' && inputs.open_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore: update ${{ inputs.upstream_name }} to ${{ inputs.version_tag }}"
          branch: "chore/update-${{ inputs.upstream_name }}-${{ inputs.version_tag }}"
          title: "chore: update ${{ inputs.upstream_name }} to ${{ inputs.version_tag }}"
          body: "Automated downstream update from upstream release event."
