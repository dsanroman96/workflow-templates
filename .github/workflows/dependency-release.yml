name: Dependency Release Template

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: string
      project_type:
        description: "Release implementation to run"
        required: true
        type: string
      version_file_path:
        description: "Optional custom version file path"
        required: false
        type: string
    secrets:
      CONSUMER_REPOS:
        required: false
      CONSUMER_REPO_PAT:
        required: false

permissions:
  contents: write

jobs:
  release-generic:
    if: ${{ inputs.project_type == 'generic' }}
    uses: ./.github/workflows/dependency-release-generic.yml
    with:
      bump: ${{ inputs.bump }}
      version_file_path: ${{ inputs.version_file_path }}
    secrets: inherit

  release-typescript:
    if: ${{ inputs.project_type == 'typescript' }}
    uses: ./.github/workflows/dependency-release-typescript.yml
    with:
      bump: ${{ inputs.bump }}
      version_file_path: ${{ inputs.version_file_path }}
    secrets: inherit

  unsupported-project-type:
    if: ${{ inputs.project_type != 'generic' && inputs.project_type != 'typescript' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail for unsupported project type
        run: |
          echo "Unsupported project_type: ${{ inputs.project_type }}"
          echo "Supported values: generic, typescript"
          exit 1
