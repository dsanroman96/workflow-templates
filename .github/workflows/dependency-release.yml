name: Dependency Release Template

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: string
      project_type:
        description: "How to read/write project version"
        required: true
        type: string
      version_file_path:
        description: "Optional custom version file path"
        required: false
        type: string
    secrets:
      CONSUMER_REPOS:
        required: false
      CONSUMER_REPO_PAT:
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout workflow templates repo
        uses: actions/checkout@v4
        with:
          repository: dsanroman96/workflow-templates
          ref: main
          path: .workflow-templates

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        env:
          PROJECT_TYPE: ${{ inputs.project_type }}
          VERSION_FILE_PATH: ${{ inputs.version_file_path }}
        run: |
          set -euo pipefail

          bump_version() {
            local current="$1"
            local bump="$2"
            local major minor patch

            IFS='.' read -r major minor patch <<< "${current}"
            case "${bump}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported bump type: ${bump}"
                exit 1
                ;;
            esac

            echo "${major}.${minor}.${patch}"
          }

          resolve_path() {
            local provided="$1"
            local default_path="$2"
            if [ -n "${provided}" ]; then
              echo "${provided}"
            else
              echo "${default_path}"
            fi
          }

          CURRENT_VERSION=""
          CHANGED_FILES=""
          TARGET_PATH=""

          case "${PROJECT_TYPE}" in
            generic)
              TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "VERSION")"
              CURRENT_VERSION="$(cat "${TARGET_PATH}")"
              CHANGED_FILES="${TARGET_PATH}"
              ;;
            typescript)
              TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "package.json")"
              CURRENT_VERSION="$(node -p "require('./${TARGET_PATH}').version")"
              CHANGED_FILES="${TARGET_PATH}"
              ;;
            python)
              TARGET_PATH="$(resolve_path "${VERSION_FILE_PATH}" "pyproject.toml")"
              CURRENT_VERSION="$(python3 .workflow-templates/scripts/bump_pyproject.py read --file "${TARGET_PATH}")"
              CHANGED_FILES="${TARGET_PATH}"
              ;;
            *)
              echo "Unsupported project_type: ${PROJECT_TYPE}"
              exit 1
              ;;
          esac

          CURRENT_VERSION="${CURRENT_VERSION#v}"
          if [[ ! "${CURRENT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version must be semantic version X.Y.Z. Got: ${CURRENT_VERSION}"
            exit 1
          fi

          NEXT_VERSION="$(bump_version "${CURRENT_VERSION}" "${{ inputs.bump }}")"

          case "${PROJECT_TYPE}" in
            generic)
              echo "${NEXT_VERSION}" > "${TARGET_PATH}"
              ;;
            typescript)
              TARGET_PATH="${TARGET_PATH}" NEXT_VERSION="${NEXT_VERSION}" node -e "const fs=require('fs'); const p=process.env.TARGET_PATH; const data=JSON.parse(fs.readFileSync(p,'utf8')); data.version=process.env.NEXT_VERSION; fs.writeFileSync(p, JSON.stringify(data, null, 2) + '\n');"
              ;;
            python)
              python3 .workflow-templates/scripts/bump_pyproject.py write --file "${TARGET_PATH}" --version "${NEXT_VERSION}"
              ;;
          esac

          echo "next_version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "changed_files=${CHANGED_FILES}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        run: |
          set -euo pipefail
          git add ${{ steps.version.outputs.changed_files }}
          git commit -m "chore: release v${{ steps.version.outputs.next_version }}"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: "Automated release."

      - name: Notify consumer repositories
        env:
          TARGET_REPOS: ${{ secrets.CONSUMER_REPOS }}
          DISPATCH_TOKEN: ${{ secrets.CONSUMER_REPO_PAT }}
          DEPENDENCY_NAME: ${{ github.event.repository.name }}
          VERSION_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_REPOS}" ] && [ -z "${DISPATCH_TOKEN}" ]; then
            echo "No consumer notification secrets configured; skipping notifications."
            exit 0
          fi

          if [ -z "${TARGET_REPOS}" ] || [ -z "${DISPATCH_TOKEN}" ]; then
            echo "Both CONSUMER_REPOS and CONSUMER_REPO_PAT are required when notifications are enabled."
            exit 1
          fi

          REPO_LIST="${TARGET_REPOS}"

          REPO_LIST="$(printf '%s' "${REPO_LIST}" | tr ',' '\n')"
          while IFS= read -r TARGET_REPO; do
            TARGET_REPO="$(echo "${TARGET_REPO}" | xargs)"
            [ -z "${TARGET_REPO}" ] && continue

            if [[ ! "${TARGET_REPO}" =~ ^[^/]+/[^/]+$ ]]; then
              echo "Invalid repository format: ${TARGET_REPO}"
              exit 1
            fi

            curl --fail-with-body -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
              "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
              -d "{\"event_type\":\"dependency-released\",\"client_payload\":{\"dependency\":\"${DEPENDENCY_NAME}\",\"version\":\"${VERSION_TAG}\"}}"
          done <<< "${REPO_LIST}"
