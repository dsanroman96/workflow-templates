name: Upstream Release Template

on:
  workflow_call:
    inputs:
      next_version:
        description: "Release version in X.Y.Z format"
        required: true
        type: string
      project_type:
        description: "Release implementation to run"
        required: true
        type: string
      release_handler:
        description: "Explicit release handler route in type/variant format (example: typescript/bun)."
        required: true
        type: string
      version_file_path:
        description: "Optional custom version file path"
        required: false
        type: string
      open_pr:
        description: "Request downstream repositories to open PRs"
        required: false
        type: boolean
        default: true
      downstream_repos:
        description: "Comma-separated owner/repo list of downstream projects"
        required: false
        type: string
        default: ""
    secrets:
      DOWNSTREAM_REPO_PAT:
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git bot
        uses: dsanroman96/workflow-templates/actions/common/configure-git-bot@main

      - name: Resolve target path and current version
        id: version
        uses: dsanroman96/workflow-templates/actions/common/resolve-project-version@main
        with:
          project_type: ${{ inputs.project_type }}
          version_file_path: ${{ inputs.version_file_path }}

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          NEXT_VERSION: ${{ inputs.next_version }}
        run: |
          set -euo pipefail
          if [[ ! "${NEXT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "next_version must match X.Y.Z. Got: ${NEXT_VERSION}"
            exit 1
          fi
          echo "next_version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Apply release logic
        id: release_logic
        uses: dsanroman96/workflow-templates/actions/common/apply-release-logic@main
        with:
          project_type: ${{ inputs.project_type }}
          release_handler: ${{ inputs.release_handler }}
          target_path: ${{ steps.version.outputs.target_path }}
          next_version: ${{ steps.release_meta.outputs.next_version }}

      - name: Finalize release
        uses: dsanroman96/workflow-templates/actions/common/finalize-release@main
        with:
          changed_files: ${{ steps.release_logic.outputs.changed_files }}
          next_version: ${{ steps.release_meta.outputs.next_version }}
          tag: ${{ steps.release_meta.outputs.tag }}

      - name: Notify downstream repositories
        uses: dsanroman96/workflow-templates/actions/common/notify-downstreams@main
        with:
          target_repos: ${{ inputs.downstream_repos }}
          dispatch_token: ${{ secrets.DOWNSTREAM_REPO_PAT }}
          upstream_name: ${{ github.event.repository.name }}
          version_tag: ${{ steps.release_meta.outputs.tag }}
          open_pr: ${{ inputs.open_pr }}
