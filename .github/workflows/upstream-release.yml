name: Upstream Release Template

on:
  workflow_call:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: string
      project_type:
        description: "Release implementation to run"
        required: true
        type: string
      version_file_path:
        description: "Optional custom version file path"
        required: false
        type: string
      open_pr:
        description: "Request downstream repositories to open PRs"
        required: false
        type: boolean
        default: true
      downstream_repos:
        description: "Comma-separated owner/repo list of downstream projects"
        required: false
        type: string
        default: ""
    secrets:
      DOWNSTREAM_REPO_PAT:
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git bot
        uses: dsanroman96/workflow-templates/actions/common/configure-git-bot@main

      - name: Resolve target path and current version
        id: version
        uses: dsanroman96/workflow-templates/actions/common/resolve-project-version@main
        with:
          project_type: ${{ inputs.project_type }}
          version_file_path: ${{ inputs.version_file_path }}

      - name: Calculate bumped version
        id: bumped
        uses: dsanroman96/workflow-templates/actions/common/calc-next-version@main
        with:
          current_version: ${{ steps.version.outputs.current_version }}
          bump: ${{ inputs.bump }}

      - name: Apply generic release logic
        if: ${{ inputs.project_type == 'generic' }}
        id: generic_release
        uses: dsanroman96/workflow-templates/actions/release-generic@main
        with:
          target_path: ${{ steps.version.outputs.target_path }}
          next_version: ${{ steps.bumped.outputs.next_version }}

      - name: Apply TypeScript release logic
        if: ${{ inputs.project_type == 'typescript' }}
        id: typescript_release
        uses: dsanroman96/workflow-templates/actions/release-typescript@main
        with:
          target_path: ${{ steps.version.outputs.target_path }}
          next_version: ${{ steps.bumped.outputs.next_version }}

      - name: Finalize release
        uses: dsanroman96/workflow-templates/actions/common/finalize-release@main
        with:
          changed_files: ${{ inputs.project_type == 'typescript' && steps.typescript_release.outputs.changed_files || steps.generic_release.outputs.changed_files }}
          next_version: ${{ steps.bumped.outputs.next_version }}
          tag: ${{ steps.bumped.outputs.tag }}

      - name: Notify downstream repositories
        uses: dsanroman96/workflow-templates/actions/common/notify-downstreams@main
        with:
          target_repos: ${{ inputs.downstream_repos }}
          dispatch_token: ${{ secrets.DOWNSTREAM_REPO_PAT }}
          upstream_name: ${{ github.event.repository.name }}
          version_tag: ${{ steps.bumped.outputs.tag }}
          open_pr: ${{ inputs.open_pr }}
